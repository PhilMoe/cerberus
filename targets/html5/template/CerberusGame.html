<!DOCTYPE html>

<html>
<head>
<!--${APP_TITLE_BEGIN}//-->
<title>CerberusGame</title>
<!--${APP_TITLE_END}//-->
<meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<style type="text/css">
body{
	height: 100%;
	overflow: hidden; /* keeps scrollbar off IE */
	font-family: arial,sans-serif;
	font-size: 13px;
	color: #fff;
	background-color: #000;
	border: 0 none black;
	padding: 0;
	margin: 0;
}
canvas{
	border: 0;
	padding: 0;
	margin: auto;
	outline: none;
	cursor: default;
	float: left;
}

div.splitter{
	background-color: #343436;
	border: 0;
	padding: 0;
	margin: 0 auto;
	width: 10px;
	/*height: 17px;*/
	float: left;
	cursor: col-resize;
	/*border-bottom: 1px solid black;*/
	/*box-shadow: 0 0 1px black;*/
	/*display: none;*/
}

#ConsoleButton {
	display: none;
	float: right;
}	

#GameConsole { 
	position: relative;
	border: 0;
	padding: 0;
	margin: 0;
	width: 100%;
	min-height: 400px;
	outline: none;
	float: right;
	resize: inherit;    
}


</style>

</head>

<body>

<div><canvas id="GameCanvas" width=640 height=960 tabindex="1"></canvas></div>

<div id="Splitter" class="splitter"></div>

<div id="GameConsole"></div>


<div id="ConsoleButton" style='position:absolute;bottom:10px;right:30px;'>
	<button onclick="clearEditor()" style='background: #343436; padding:5px;color:white;border:0px;cursor:pointer;cursor:hand;'>CLEAR</button>
</div>


</body>

<script language="javascript" src="main.js"></script>
<script language="javascript" src="./js/ace/src-min/ace.js"></script>

<script>

<!--${CANVAS_BEGIN}//-->
var CANVAS_RESIZE_MODE=1;	//0=locked, 1=stretch, 2=resize
var CANVAS_WIDTH=640;
var CANVAS_HEIGHT=480;
var CONSOLE_SHOW=1;
<!--${CANVAS_END}//-->

var editor=0;

function clearEditor(){
	editor.setValue("");
}


window.onload=function( e ){

	var canvas=document.getElementById( "GameCanvas" );
	var splitter=document.getElementById( "Splitter" );
	var console=document.getElementById( "GameConsole" );
	var button=document.getElementById( "ConsoleButton" );
	
	var _ace = ace.edit("GameConsole");
	_ace.setTheme("ace/theme/monokai");
	_ace.session.setMode("ace/mode/text");
	_ace.setReadOnly(true);
	_ace.session.setUseWrapMode(true);
	editor = _ace;
	//document.getElementById('GameConsole').style.fontSize='22px';
	
	var mouseDown=false;
	var startY=0;
	var canvasH=CANVAS_HEIGHT;
	var cmousemove=null;
	var cmouseup=null;
	var cmouseout=null;
	var fscreen=false;

	canvas.width=CANVAS_WIDTH;
	canvas.height=CANVAS_HEIGHT;

	function eatEvent( e ){
		if( e.stopPropagation ){
			e.stopPropagation();
			e.preventDefault();
		}else{
			e.cancelBubble=true;
			e.returnValue=false;
		}
	}
	
	function requestFullscreen(){
		var rfs=canvas.requestFullscreen || canvas.webkitRequestFullScreen || canvas.mozRequestFullScreen;
		if( rfs ) rfs.call( canvas );
	}
	
	function updateSize(){

	    if (CONSOLE_SHOW === 1) {
	        splitter.style.display = "block";
	        console.style.display = "block";
	        button.style.display = "block";
	    } else {
	        splitter.style.display = "none";
	        console.style.display = "none";
	        button.style.display = "none";
	    }
	  
		if( fscreen || CONSOLE_SHOW === 0){
			canvasH=window.innerHeight;
		}else if( canvasH<0 ){
			canvasH=0;
		}else if( canvasH+splitter.clientHeight>=window.innerHeight ){
			canvasH=window.innerHeight-splitter.clientHeight;
		}
		
		switch( CANVAS_RESIZE_MODE ){
		case 0:
			canvas.parentNode.style.height=canvasH+"px";
			break;
		case 1:
			canvas.style.height=canvasH+"px";
			break;
		case 2:
			canvas.width=document.body.clientWidth;
			canvas.height=canvasH;
			canvas.style.height=canvasH+"px";
			break;
		}
		console.style.height=(fscreen ? 0 : window.innerHeight-splitter.clientHeight-canvasH)+"px";

		//Note! Any resize code that modifies canvas.width/canvas.height/canvas.style.width/canvas.style.height should call this to update canvas...
		if( canvas.updateSize ) canvas.updateSize();
		editor.resize();
	}
	
	canvas.onfullscreenchange=function( e ){
		fscreen=(document.fullscreenElement==canvas);
		updateSize();
	}
	
	canvas.onwebkitfullscreenchange=function( e ){
		fscreen=(document.webkitFullscreenElement==canvas);
		updateSize();
	}
	
	canvas.onmozfullscreenchange=function( e ){
		fscreen=(document.mozFullscreenElement==canvas);
		updateSize();
	}
	
	splitter.onmousedown=function( e ){
		mouseDown=true;
		startY=e.clientY;
		cmousemove=canvas.onmousemove;
		cmouseup=canvas.onmouseup;
		cmouseout=canvas.onmouseout;
		canvas.onmousemove=null;
		canvas.onmouseup=null;
		canvas.onmouseout=null;
		eatEvent( e );
	}
	
	window.onmousemove=function( e ){
		if( mouseDown ){
			var dy=e.clientY-startY;
			startY+=dy;
			canvasH+=dy;
			updateSize();
			eatEvent( e );
		}
	}
	
	window.onmouseup=function( e ){
		if( mouseDown ){
			canvas.onmousemove=cmousemove;
			canvas.onmouseup=cmouseup;
			canvas.onmouseout=cmouseout;
			mouseDown=false;
			eatEvent( e );
			
			if( canvasH+splitter.clientHeight>=window.innerHeight ) requestFullscreen();
		}
	}
	
	window.onresize=function( e ){
		updateSize();
	}
	
	updateSize();

	BBCerberusGame.Main( canvas );
}
</script>

</html>
